name: HL Intel Cron
run-name: "hl-intel: scheduled run at ${{ github.event.schedule || 'manual' }}"

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:
    inputs:
      depth:
        description: 'Number of traders to analyse'
        required: false
        default: '20'
        type: string

jobs:
  intel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install hyperliquid-python-sdk eth-account --quiet

      - name: Run intel scan
        id: intel
        env:
          HL_WALLET_ADDRESS: ${{ secrets.HL_WALLET_ADDRESS }}
        run: |
          DEPTH="${{ inputs.depth || '20' }}"
          echo "Running intel scan with depth=$DEPTH..."

          mkdir -p memory/logs

          python scripts/hl/intel.py --json --depth "$DEPTH" > /tmp/intel_raw.json 2>/tmp/intel_stderr.txt
          EXIT_CODE=$?

          cat /tmp/intel_stderr.txt >&2

          if [ $EXIT_CODE -ne 0 ]; then
            echo "Intel scan failed with exit code $EXIT_CODE"
            cat /tmp/intel_stderr.txt
            exit 1
          fi

          # Copy to latest + timestamped
          cp /tmp/intel_raw.json memory/logs/intel-latest.json

          DATE=$(date -u +%Y-%m-%d)
          HOUR=$(date -u +%H)
          cp /tmp/intel_raw.json "memory/logs/${DATE}-${HOUR}00-intel.json"

          # Extract summary fields for notification
          REGIME=$(python3 -c "import json,sys; d=json.load(open('/tmp/intel_raw.json')); print(d['summary']['market_regime'])" 2>/dev/null || echo "?")
          FG=$(python3 -c "import json,sys; d=json.load(open('/tmp/intel_raw.json')); print(d['summary']['fear_greed'])" 2>/dev/null || echo "?")
          FG_CLS=$(python3 -c "import json,sys; d=json.load(open('/tmp/intel_raw.json')); print(d['summary']['fear_greed_cls'])" 2>/dev/null || echo "?")
          BTC_PX=$(python3 -c "import json,sys; d=json.load(open('/tmp/intel_raw.json')); print(f\"\${d['summary']['btc_price']:,.0f}\")" 2>/dev/null || echo "?")
          BIAS=$(python3 -c "import json,sys; d=json.load(open('/tmp/intel_raw.json')); print(d['summary']['macro_bias'])" 2>/dev/null || echo "?")
          HIGH_CNT=$(python3 -c "import json,sys; d=json.load(open('/tmp/intel_raw.json')); print(d['summary']['high_conviction_count'])" 2>/dev/null || echo "0")
          TOP=$(python3 -c "
          import json
          d = json.load(open('/tmp/intel_raw.json'))
          strats = d['summary']['top_strategies'][:3]
          print(' | '.join(strats))
          " 2>/dev/null || echo "")
          MARKETS=$(python3 -c "import json,sys; d=json.load(open('/tmp/intel_raw.json')); print(d['summary']['total_markets_scanned'])" 2>/dev/null || echo "?")
          TRADERS=$(python3 -c "import json,sys; d=json.load(open('/tmp/intel_raw.json')); print(d['summary']['traders_analysed'])" 2>/dev/null || echo "?")

          echo "regime=$REGIME" >> "$GITHUB_OUTPUT"
          echo "fg=$FG" >> "$GITHUB_OUTPUT"
          echo "fg_cls=$FG_CLS" >> "$GITHUB_OUTPUT"
          echo "btc_px=$BTC_PX" >> "$GITHUB_OUTPUT"
          echo "bias=$BIAS" >> "$GITHUB_OUTPUT"
          echo "high_cnt=$HIGH_CNT" >> "$GITHUB_OUTPUT"
          echo "top=$TOP" >> "$GITHUB_OUTPUT"
          echo "markets=$MARKETS" >> "$GITHUB_OUTPUT"
          echo "traders=$TRADERS" >> "$GITHUB_OUTPUT"

      - name: Commit intel data
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add memory/logs/intel-latest.json "memory/logs/$(date -u +%Y-%m-%d)-$(date -u +%H)00-intel.json" 2>/dev/null || true
          git diff --staged --quiet || git commit -m "intel: update $(date -u +%Y-%m-%dT%H:%M)Z — ${{ steps.intel.outputs.regime }} | FG=${{ steps.intel.outputs.fg }} | BTC=\$${{ steps.intel.outputs.btc_px }}"
          git push || true

      - name: Notify Telegram
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🧠 *HL Intel Update — $(date -u +%Y-%m-%d\ %H:%M) UTC*

          📊 Regime: *${{ steps.intel.outputs.regime }}* | Bias: *${{ steps.intel.outputs.bias }}*
          😱 Fear/Greed: *${{ steps.intel.outputs.fg }}* (${{ steps.intel.outputs.fg_cls }})
          ₿ BTC: *\$${{ steps.intel.outputs.btc_px }}*

          🎯 *${{ steps.intel.outputs.high_cnt }} HIGH conviction trades:*
          ${{ steps.intel.outputs.top }}

          📡 ${{ steps.intel.outputs.markets }} markets | ${{ steps.intel.outputs.traders }} whales scanned"

          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat "$TELEGRAM_CHAT_ID" \
              --arg text "$MSG" \
              '{chat_id: $chat, text: $text, parse_mode: "Markdown"}')" > /dev/null

      - name: Notify on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat "$TELEGRAM_CHAT_ID" \
              --arg text "⚠️ HL Intel Cron FAILED at $(date -u +%Y-%m-%dT%H:%M)Z. Check workflow logs." \
              '{chat_id: $chat, text: $text}')" > /dev/null || true
