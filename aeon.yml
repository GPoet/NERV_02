# Aeon configuration
#
# Enable skills by setting enabled: true. Multiple skills at the same time run in parallel.

skills:
  # --- Morning intel (7 AM UTC) ---
  # rss-digest, hacker-news-digest, paper-digest, tweet-digest run first (no deps).
  # morning-brief waits for all four, then synthesizes a single briefing.
  rss-digest:
    enabled: true
    schedule: "0 7 * * *"
    outputs: [feed-highlights]
  hacker-news-digest:
    enabled: true
    schedule: "0 7 * * *"
    outputs: [hn-stories]
  paper-digest:
    enabled: true
    schedule: "0 7 * * *"
    outputs: [papers]
  tweet-digest:
    enabled: true
    schedule: "0 7 * * *"
    outputs: [tweet-highlights]
  morning-brief:
    enabled: true
    schedule: "0 7 * * *"
    dependsOn: [rss-digest, hacker-news-digest, paper-digest, tweet-digest]

  # --- Mid-morning (9 AM UTC) ---
  issue-triage:
    enabled: true
    schedule: "0 9 * * *"
    outputs: [triaged-issues]
  pr-review:
    enabled: true
    schedule: "0 9 * * *"
  github-monitor:
    enabled: true
    schedule: "0 9 * * *"

  # --- Midday (12 PM UTC) ---
  token-alert:
    enabled: true
    schedule: "0 12 * * *"
    outputs: [token-alerts]
  wallet-digest:
    enabled: true
    schedule: "0 12 * * *"
    outputs: [wallet-summary]
  on-chain-monitor:
    enabled: true
    schedule: "0 12 * * *"
    outputs: [on-chain-events]
  defi-monitor:
    enabled: true
    schedule: "0 12 * * *"
    outputs: [defi-alerts]

  # --- Afternoon (2 PM UTC) ---
  article:
    enabled: true
    schedule: "0 14 * * *"
  digest:
    enabled: true
    schedule: "0 14 * * *"
  grindingpoet-ai:
    enabled: true
    schedule: "0 15 * * *"

  # --- Late afternoon (4 PM UTC) ---
  code-health:
    enabled: true
    schedule: "0 16 * * *"
    outputs: [health-report]
  changelog:
    enabled: true
    schedule: "0 16 * * *"
  feature:
    enabled: true
    schedule: "0 16 * * *"
    dependsOn: [issue-triage]
  build-skill:
    enabled: true
    schedule: "0 16 * * *"

  # --- Evening / meta (6 PM UTC) ---
  # reflect depends on self-review; memory-flush depends on reflect
  goal-tracker:
    enabled: true
    schedule: "0 18 * * *"
  skill-health:
    enabled: true
    schedule: "0 18 * * *"
  self-review:
    enabled: true
    schedule: "0 18 * * *"
    outputs: [review-findings]
  reflect:
    enabled: true
    schedule: "0 18 * * *"
    dependsOn: [self-review]
    outputs: [reflections]
  memory-flush:
    enabled: true
    schedule: "0 18 * * *"
    dependsOn: [reflect]

  # --- Overnight evolution (2 AM UTC = 7:30 AM IST) ---
  autoevolve:
    enabled: true
    schedule: "0 2 * * *"
    dependsOn: [skill-health]

  # --- Weekly (Monday only) ---
  weekly-review:
    enabled: true
    schedule: "0 19 * * 1"

  truenorth-twitter-skill:
    enabled: true
    schedule: "0 12 * * *"

  grindingpoet-ai:
    enabled: false
    schedule: "0 12 * * *"

  # --- Fallback (must be last) ---
  heartbeat:
    enabled: true
    schedule: "0 12 * * *"

# Default model for all skills. Override per-run via workflow_dispatch.
# Options: claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5-20251001
model: claude-opus-4-6

# Messaging integration
# Polls for messages every 5 minutes on Telegram/Discord/Slack.
telegram:
  enabled: true